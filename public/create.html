<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <title>Create</title>
    <script src="./create.js" defer></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="review_camp">
        <input type="text" class="input-user" id="title" placeholder="Título">
        <select class="input-user" id="type">
            <option value="review">Review</option>
            <option value="critic">Critica</option>
            <option value="analysis">Análise</option>
            <option value="opnion">Opnião</option>
        </select>
        <select class="input-user" id="genre">
            <option value="movie">Filme</option>
            <option value="serie">Série</option>
            <option value="game">Jogo</option>
        </select>
        <div id="content" contenteditable="true"></div>
        <button class="input-user" onclick="Create()">Publicar</button>
    </div>
</body>
</html>
